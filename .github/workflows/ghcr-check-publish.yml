name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read   # checkout
  packages: write  # push image to ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install native VAD runtime libraries
      # ten-vad's bundled libten_vad.so links against LLVM libc++
      # (libc++.so.1 / libc++abi.so.1), absent on the stock ubuntu runner.
      # Without them the real TEN engine integration tests fail at CDLL load.
      run: |
        for i in 1 2 3; do sudo apt-get update && break; sleep 5; done
        sudo apt-get install -y --no-install-recommends libc++1 libc++abi1

    - name: Install dependencies
      run: pip install -r requirements-dev.txt

    - name: Run tests
      run: pytest --tb=short -q   # config comes from data/config.json via ConfigService, no ENV needed

  build:
    runs-on: ubuntu-latest
    needs: test                          # no green tests → no image is built
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history + tags so `git describe --tags` works

    - name: Derive version from Git tag
      id: version
      run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build the Docker image
      run: docker build . --file Dockerfile --build-arg VERSION="${{ steps.version.outputs.version }}" --tag ghcr.io/${{ github.repository }}:latest --tag ghcr.io/${{ github.repository }}:${{ github.sha }}

    - name: Push Docker images
      run: |
        docker push ghcr.io/${{ github.repository }}:latest
        docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
