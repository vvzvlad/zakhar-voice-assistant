name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read   # checkout
  packages: write  # push image to ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements-dev.txt

    - name: Run tests
      env:                               # required ENV so importing settings works
        INTENT_API_KEY: test-intent-key
        STT_API_KEY: test-stt-key
        OPENWEATHERMAP_API_KEY: test-openweathermap-key
        MCP_SMARTHOME_URL: http://mcp.test:8001/mcp
        TTS_BASE_URL: http://tts.test:8124
        PUBLIC_BASE_URL: http://10.0.0.10:8200
        ESPHOME_DEVICES: living|10.0.0.5|dGVzdA==
      run: pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: test                          # no green tests → no image is built
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/${{ github.repository }}:latest --tag ghcr.io/${{ github.repository }}:${{ github.sha }}

    - name: Push Docker images
      run: |
        docker push ghcr.io/${{ github.repository }}:latest
        docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
