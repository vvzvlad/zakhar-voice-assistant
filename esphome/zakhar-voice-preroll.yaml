# ESPHome config for the HA Voice PE (ESP32-S3) with the custom "Захар" wake word
# AND the PRE-ROLL voice_assistant fork — say «Захар <команда>» in ONE continuous
# breath, no waiting for the confirmation beep.
#
# This is now the SINGLE canonical device config (the plain zakhar-voice.yaml was
# removed): a pre-roll fork of the stock HA Voice PE firmware, carrying everything in
# one place. On top of the stock firmware it adds:
#   1) external_components: swap in the patched `voice_assistant` (zakhar-preroll/).
#   2) voice_assistant: preroll_duration — how much audio BEFORE wake detection to
#      prepend to the stream, so the server receives «Захар …» + the command as one
#      stream (the «захар» segment is then also available for a server-side verifier).
#   3) Runtime panel controls (Wake Probability Cutoff + Speaker Volume) tunable live
#      from the server's Devices page with no re-flash.
#   4) Config Version / Model Version diagnostic entities to confirm what's flashed.
#
# The stock firmware (mic, LED ring, buttons, media player, timers, OTA, improv,
# etc.) is still pulled UNCHANGED from the official Nabu Casa package; we only
# override the device name, Wi-Fi/API creds, the micro_wake_word model, and now the
# voice_assistant component + preroll.
#
# First flash MUST be over USB-C (factory OTA creds unknown); then OTA works.
#   esphome run zakhar-voice-preroll.yaml     # pick the USB serial port when asked
#
# AFTER FLASHING: the STT transcript now starts with «захар …» (the wake word is in
# the streamed audio). The voice-assistant server must STRIP the leading wake phrase
# before processing the command. Tune `preroll_duration` (1200–2000 ms) on hardware
# to match v8's detection latency. See zakhar-preroll/README.md.
#
# NOTE: the fork is pinned to ESPHome 2026.5.x (same as home-assistant-voice@26.5.0).
# When you bump ESPHome past 2026.5.x, the fork must be rebased (see its README).

substitutions:
  # Bump on EVERY change to this device config — the Config Version entity lets you
  # verify which config is actually flashed (catches a stale / wrong-file flash).
  config_version: "v14_preroll"
  # micro_wake_word model version flashed; keep in sync with the model path in
  # packages.zakhar_wake_word below
  model_version: "zakhar_v27"

# --- Pre-roll fork: overrides the built-in voice_assistant with the patched copy ---
# We now ALSO fork micro_wake_word from the SAME local source. The micro_wake_word fork
# is a verbatim copy of the stock component with ONE additive, non-destructive change
# (a gated peak-probability getter on StreamingModel) — NO config-schema change — used
# only to expose the live "Wake Probability" sensor below. Like the voice_assistant
# fork it is pinned to ESPHome 2026.5.x; bumping ESPHome past 2026.5.x requires rebasing
# BOTH forks (see zakhar-preroll/README.md and the header in components/micro_wake_word).
external_components:
  - source:
      type: local
      path: zakhar-preroll/components
    components: [voice_assistant, micro_wake_word]

packages:
  # IMPORTANT: this inline package is declared FIRST on purpose. ESPHome appends
  # a package's list items onto the config that is already present, so declaring
  # our model here places "Захар" at the FRONT of micro_wake_word.models — and
  # only the first model is enabled on a fresh flash, so "Захар" becomes the
  # default active wake word. (Same ordering trick the official
  # home-assistant-voice.factory.yaml uses for on_client_connected.)
  zakhar_wake_word:
    micro_wake_word:
      models:
        # Local path to the model committed in this repo. ESPHome resolves the
        # manifest's relative "model": "zakhar.tflite" against this file's dir, so
        # both .json and .tflite are read straight from microWakeWord/v27/model/.
        # (A remote github:// / raw URL fails here: ESPHome can't resolve the
        # relative .tflite inside a manifest fetched that way.)
        #
        # v27 = v16 recipe + SYNTHETIC short-«захар» negatives (light weight 4/5). It is the
        # FIRST single model to BEAT v16 on the honest device eval: it FIXES the field
        # short-«захар» false-trigger (firing on the plain name «Захар» dropped 65%->23%)
        # while slightly IMPROVING drawn-out recall (FRR 21.0%->19.3% @0.90) and keeping
        # every FAPH class low (music 5.8->2.9/h). Same size (77848 B) and firmware config
        # as v16. The recipe is tuned to swap synthetic -> REAL short-«захар» recordings when
        # available (expected to push the short-firing lower at the same recall).
        # See ../microWakeWord/v27/{TRAINING_REPORT_v27,SUMMARY_real_eval}.md.
        # Music false-accepts stay ~0 via the stock VAD pre-gate (inherited here).
        - model: ../microWakeWord/v27/model/zakhar.json
          id: zakhar
          # Operating point: cutoff 0.90 — v27's eval knee (FRR 19.3%, FAPH ~1.2/h with VAD).
          # The DET sweep showed v16's old 0.95 was OVER-tightening (its FAPH plateaus
          # 0.85->0.95), so v27 ships at its proper knee 0.90. v27's silence-FAPH @0.90 is
          # ~0.8/h (low); if real silence false-fires appear in the field, raise to 0.95 via
          # the panel (Wake Probability Cutoff, below) -> FRR 22.7%, FAPH 0.86/h. (sliding
          # window = v27 manifest default 5.) Keep device VAD on — halves FAPH at no recall cost.
          probability_cutoff: 90%

  # Official Home Assistant Voice PE firmware, pinned to a release tag.
  # Bump the @ref to update the base firmware later.
  home-assistant-voice: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@26.5.0

# --- Our overrides (deep-merged into the official config) ---

esphome:
  name: zakhar-voice
  friendly_name: Zakhar Voice

# Pre-roll: prepend this much pre-detection audio to the stream so «Захар <команда>»
# arrives as one continuous utterance (deep-merged into the package's voice_assistant).
# Set 0ms to disable.
voice_assistant:
  preroll_duration: 2000ms

# Disable the wake-word confirmation chime ("блям"). With pre-roll the user speaks
# «Захар <команда>» continuously, so the stock chime overlaps and corrupts the
# command audio. The stock firmware gates that chime on a `wake_sound` switch
# (default ON); !extend forces it ALWAYS_OFF on every boot (still a HA switch you can
# flip back on if ever wanted).
switch:
  - id: !extend wake_sound
    restore_mode: ALWAYS_OFF

  # Wake Probability stream gate (object_id wake_probability_stream). The server flips
  # this ON when the device modal opens and OFF when it closes, so the firmware only
  # tracks/publishes the live Wake Probability while someone is actually watching — no
  # constant network traffic otherwise. optimistic: the state follows the command with
  # no device feedback path. ALWAYS_OFF: never stream after a reboot if nobody's looking.
  #
  # IMPORTANT: the Native API object_id = slugify(name), NOT the YAML `id:` field — the
  # server matches on object_id, so this name MUST slugify to `wake_probability_stream`.
  - platform: template
    name: "Wake Probability Stream"
    id: wake_probability_stream
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: 'id(zakhar)->set_stream_enabled(true);'
    on_turn_off:
      then:
        - lambda: 'id(zakhar)->set_stream_enabled(false);'

# --- Firmware versioning: config + model version as separate read-only diagnostic
# entities, so you can confirm exactly what's flashed and catch config/file drift.
text_sensor:
  - platform: template
    name: "Config Version"
    id: cfg_version
    entity_category: diagnostic
    update_interval: never
  - platform: template
    name: "Model Version"
    id: mdl_version
    entity_category: diagnostic
    update_interval: never

# --- Live Wake Probability (object_id wake_probability) ---
# Read-only diagnostic sensor that reports the on-device PEAK wake-word probability over
# the last second as a percentage. We publish it MANUALLY from the 1s interval below
# (update_interval: never), and ONLY while the "Wake Probability Stream" switch is ON, so
# there is no constant network traffic when nobody is watching.
#
# IMPORTANT: the Native API object_id = slugify(name), NOT the YAML `id:` field — the
# server matches on object_id, so this name MUST slugify to `wake_probability`.
sensor:
  - platform: template
    name: "Wake Probability"
    id: wake_probability_sensor
    unit_of_measurement: "%"
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: never

# One 1s housekeeping tick — no logging of its own:
#   * mirror the real media-player volume onto the Speaker Volume slider, but
#     publish ONLY when it actually changed (no per-tick spam; reflects the dial);
#   * publish the static Config/Model version strings exactly once (while still empty).
interval:
  - interval: 1s
    then:
      - lambda: |-
          // Volume: publish only on change. publish_state() does NOT run set_action,
          // so this can't feed back into media_player.volume_set.
          float v = id(external_media_player)->volume * 100.0f;
          float cur = id(speaker_volume_number).state;
          // cur is NaN before the first publish (NaN != NaN), so this fires once at boot too.
          if (!(cur == cur) || fabsf(v - cur) >= 0.5f) {
            id(speaker_volume_number).publish_state(v);
          }
          // Versions: publish the static strings once, then never again (state stays set).
          if (id(cfg_version).state.empty()) {
            id(cfg_version).publish_state("${config_version}");
          }
          if (id(mdl_version).state.empty()) {
            id(mdl_version).publish_state("${model_version}");
          }
          // Wake Probability: publish the on-device PEAK probability over the last second
          // as a percentage, but ONLY while the panel has enabled the stream (switch ON).
          // read_and_reset returns 0..255 and clears the running peak, so each tick reports
          // that second's max. When the switch is OFF we publish nothing (no traffic).
          if (id(wake_probability_stream).state) {
            uint8_t peak = id(zakhar)->read_and_reset_stream_peak();
            id(wake_probability_sensor).publish_state(peak / 255.0f * 100.0f);
          }

# Bake Wi-Fi credentials in (the stock config relies on Bluetooth/serial "improv"
# provisioning; for a headless setup hard-coding the network is more reliable).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Our own API encryption key. The voice-assistant server must use this SAME key
# in ESPHOME_DEVICES (.env) to connect after we take control.
api:
  encryption:
    key: !secret api_encryption_key

# --- Recording indicator: red blinking LED ring while a manual capture runs ---
#
# `capture_active` gates the blink loop; the capture button flips it true on press
# and false when the window ends. restore_value: no — a reboot mid-capture leaves
# no stale capture in flight, so the flag must start false.
globals:
  - id: capture_active
    type: bool
    restore_value: no
    initial_value: 'false'

# While capture_active, re-assert a solid RED ring every ~300ms so the stock LED
# ring reads as a camera-style "recording" light. We re-assert on a loop because
# voice_assistant.start (fired by the capture button) triggers the firmware's own
# on_listening effect ("Listening For Command") on `voice_assistant_leds`; the
# re-assert overrides that effect each cycle. (The stock `effect: "Error"` is a
# fast red pulse, but this explicit loop is more robust against the firmware
# re-driving the ring.) On exit, turn the ring off so the firmware restores idle.
script:
  - id: capture_blink
    then:
      - while:
          condition:
            lambda: 'return id(capture_active);'
          then:
            - light.turn_on:
                id: voice_assistant_leds
                red: 100%
                green: 0%
                blue: 0%
                brightness: 80%
                effect: none
            - delay: 300ms
            - light.turn_off: voice_assistant_leds
            - delay: 300ms
      - light.turn_off: voice_assistant_leds

# --- Manual "record X seconds" capture trigger ---
#
# A device-side, self-timed sample capture exposed to our server over the Native
# API. The server discovers these two template entities by their object_id
# (`capture_seconds`, `capture_sample`), sets the duration, then
# presses the button. The button runs the device's voice_assistant for the chosen
# number of seconds with silence detection OFF, so the speaker streams mic PCM for
# the whole window; our server records that audio in capture-only mode (no STT/LLM/
# TTS). `voice_assistant.start`/`voice_assistant.stop` resolve against the single
# voice_assistant instance defined by the official home-assistant-voice package
# (the package's own on_wake_word_detected already calls voice_assistant.start, so
# the action exists without needing an explicit id).
#
# PRE-ROLL CAVEAT: with preroll on, a manual capture session also begins with ~1.5 s
# of pre-press audio prepended. For idle-room / playback captures that extra lead-in
# is harmless (silence-trimmed downstream); if you want exact-window captures, the
# fork exposes set_preroll_enabled(false)/(true) — gate it around start/stop once the
# stock voice_assistant `id` is confirmed on hardware.
#
# IMPORTANT: the Native API transmits each entity's object_id as slugify(name),
# NOT the YAML `id:` field. The server matches on those slugified object_ids, so
# the names below MUST slugify to `capture_seconds` / `capture_sample`
# (i.e. "Capture Seconds" / "Capture Sample"). The C++
# `id:` fields stay as-is — they're referenced by `id(...)` in the lambda below.
number:
  - platform: template
    name: "Capture Seconds"
    id: capture_seconds
    optimistic: true
    min_value: 1
    max_value: 300
    step: 1
    initial_value: 5
    restore_value: true
  # Runtime wake-word sensitivity (object_id wake_probability_cutoff) — the server
  # exposes it as a 0..100 slider on the Devices page; tune live, no re-flash.
  - platform: template
    name: "Wake Probability Cutoff"
    id: wake_probability_cutoff
    optimistic: true
    restore_value: true
    initial_value: 80
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    mode: slider
    on_value:
      then:
        - lambda: |-
            // micro_wake_word stores the cutoff as a uint8 (probability * 255).
            // Convert this percentage entity (0..100) to that 0..255 scale and push it
            // to the model at runtime. Truncate (not round) to match ESPHome's own
            // codegen, which bakes the static cutoff as int(probability * 255) — so the
            // runtime knob behaves identically to re-flashing with the same %.
            const float frac = x / 100.0f;
            id(zakhar)->set_probability_cutoff((uint8_t) (frac * 255.0f));
  # Runtime speaker-volume control (object_id speaker_volume) on a plain 0..100 scale.
  # optimistic + set_action: writing it (panel/HA) runs media_player.volume_set AND
  # publishes the set value immediately. The REAL volume (incl. the physical dial) is
  # reflected back by the 1s interval below, which publishes ONLY on change — so there
  # is no per-tick log/API spam. (publish_state from that interval does NOT re-trigger
  # set_action, so there's no feedback loop.)
  - platform: template
    name: "Speaker Volume"
    id: speaker_volume_number
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    mode: slider
    set_action:
      - media_player.volume_set:
          id: external_media_player
          volume: !lambda 'return x / 100.0f;'

button:
  - platform: template
    name: "Capture Sample"
    id: capture_sample
    on_press:
      # Stop micro_wake_word for the whole capture window. Otherwise the official
      # package's on_wake_word_detected fires the moment the user says the wake
      # word and calls voice_assistant.start, which aborts this manual session.
      # Always restart it afterwards so normal on-device wake detection resumes.
      #
      # HARDWARE CAVEAT (verify on real hardware): the micro_wake_word.start below
      # is our explicit wake-word recovery after voice_assistant.stop. The pinned
      # home-assistant-voice@26.5.0 package ALSO has its own voice_assistant on_end
      # teardown that may touch micro_wake_word (start/stop mww as part of its state
      # machine). The two could race or double-toggle mww, so wake-word recovery
      # after a manual capture MUST be confirmed on a real device against that exact
      # pinned package version. This is not verifiable from the repo; do not change
      # the action sequence without testing on hardware.
      #
      # LED CAVEAT (verify on real hardware): the red blink loop below shares the
      # stock LED ring (`voice_assistant_leds`) with the firmware's own
      # voice_assistant LED state machine — `voice_assistant.start` triggers the
      # package's on_listening effect ("Listening For Command"), so capture_blink
      # re-asserts solid red every cycle to override it. This interaction (and the
      # final light.turn_off restoring idle) MUST be confirmed against the pinned
      # home-assistant-voice@26.5.0 package, which re-drives the ring on its own
      # state transitions.
      - globals.set:
          id: capture_active
          value: 'true'
      - script.execute: capture_blink
      - micro_wake_word.stop:
      - voice_assistant.start:
          silence_detection: false
      - delay: !lambda 'return (int)(id(capture_seconds).state * 1000);'
      - voice_assistant.stop:
      - globals.set:
          id: capture_active
          value: 'false'
      - script.stop: capture_blink
      - light.turn_off: voice_assistant_leds
      - micro_wake_word.start:
