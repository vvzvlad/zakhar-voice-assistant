# ESPHome config that takes control of a Home Assistant Voice PE (ESP32-S3) and
# runs the custom "Захар" wake word on-device.
#
# The full stock firmware (mic, LED ring, buttons, media player, timers, OTA,
# improv, etc.) is pulled UNCHANGED from the official Nabu Casa repo as a remote
# package. We only override three things below: the device name, the Wi-Fi/API
# credentials, and the micro_wake_word model list (to add "Захар").
#
# First flash MUST be over USB-C — the factory firmware's OTA credentials are
# unknown to us. After the first wired flash, updates can go over the air.
#
#   esphome run zakhar-voice.yaml     # pick the USB serial port when asked
#
# See README.md in this folder for the full procedure.

packages:
  # IMPORTANT: this inline package is declared FIRST on purpose. ESPHome appends
  # a package's list items onto the config that is already present, so declaring
  # our model here places "Захар" at the FRONT of micro_wake_word.models — and
  # only the first model is enabled on a fresh flash, so "Захар" becomes the
  # default active wake word. (Same ordering trick the official
  # home-assistant-voice.factory.yaml uses for on_client_connected.)
  zakhar_wake_word:
    micro_wake_word:
      models:
        # Local path to the model already committed in this repo. ESPHome resolves
        # the manifest's relative "model": "zakhar.tflite" against this file's dir,
        # so both .json and .tflite are read straight from microWakeWord/v11/model/.
        # (A remote github:// / raw URL fails here: ESPHome can't resolve the
        # relative .tflite inside a manifest fetched that way.)
        #
        # v11 = v8 recipe + REAL device-tract negatives (idle/silence ~166min +
        # music ~38min, recorded through this Voice PE). This FIXED the field bug:
        # v8 actually false-fired ~12.5/h in real idle-room silence (synthetic noise
        # gave 0 — it's real room texture amplified by the PCAN frontend; VAD masked
        # it in the field but any gap leaked). v11 cuts real silence-FAPH 12.5->0.8/h,
        # music 9.3->0/h, and improves real-human FRR 4.7->0.9%. Beats v8 on the field.
        # VAD pre-gate is still inherited from the stock HA Voice PE firmware.
        - model: ../microWakeWord/v11/model/zakhar.json
          id: zakhar
          # v11 deploy point (от которого считаны метрики выше): cutoff 0.90 / window 5.
          # Raise toward 0.95 if it ever feels trigger-happy; lower if «захааар» is missed.
          probability_cutoff: 90%
          sliding_window_size: 5

  # Official Home Assistant Voice PE firmware, pinned to a release tag.
  # Bump the @ref to update the base firmware later.
  home-assistant-voice: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@26.5.0

# --- Our overrides (deep-merged into the official config) ---

esphome:
  name: zakhar-voice
  friendly_name: Zakhar Voice

# Bake Wi-Fi credentials in (the stock config relies on Bluetooth/serial "improv"
# provisioning; for a headless setup hard-coding the network is more reliable).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Our own API encryption key. The voice-assistant server must use this SAME key
# in ESPHOME_DEVICES (.env) to connect after we take control.
api:
  encryption:
    key: !secret api_encryption_key

# --- Manual "record X seconds" capture trigger ---
#
# A device-side, self-timed sample capture exposed to our server over the Native
# API. The server discovers these two template entities by their object_id
# (`zakhar_capture_seconds`, `zakhar_capture_sample`), sets the duration, then
# presses the button. The button runs the device's voice_assistant for the chosen
# number of seconds with silence detection OFF, so the speaker streams mic PCM for
# the whole window; our server records that audio in capture-only mode (no STT/LLM/
# TTS). `voice_assistant.start`/`voice_assistant.stop` resolve against the single
# voice_assistant instance defined by the official home-assistant-voice package
# (the package's own on_wake_word_detected already calls voice_assistant.start, so
# the action exists without needing an explicit id).
#
# IMPORTANT: the Native API transmits each entity's object_id as slugify(name),
# NOT the YAML `id:` field. The server matches on those slugified object_ids, so
# the names below MUST slugify to `zakhar_capture_seconds` / `zakhar_capture_sample`
# (i.e. "Zakhar Capture Seconds" / "Zakhar Capture Sample"). The `zakhar_` prefix
# also keeps these from clashing with the official package's own entities. The C++
# `id:` fields stay as-is — they're referenced by `id(...)` in the lambda below.
number:
  - platform: template
    name: "Zakhar Capture Seconds"
    id: zakhar_capture_seconds
    optimistic: true
    min_value: 1
    max_value: 300
    step: 1
    initial_value: 5
    restore_value: true

button:
  - platform: template
    name: "Zakhar Capture Sample"
    id: zakhar_capture_sample
    on_press:
      # Stop micro_wake_word for the whole capture window. Otherwise the official
      # package's on_wake_word_detected fires the moment the user says the wake
      # word and calls voice_assistant.start, which aborts this manual session.
      # Always restart it afterwards so normal on-device wake detection resumes.
      #
      # HARDWARE CAVEAT (verify on real hardware): the micro_wake_word.start below
      # is our explicit wake-word recovery after voice_assistant.stop. The pinned
      # home-assistant-voice@26.5.0 package ALSO has its own voice_assistant on_end
      # teardown that may touch micro_wake_word (start/stop mww as part of its state
      # machine). The two could race or double-toggle mww, so wake-word recovery
      # after a manual capture MUST be confirmed on a real device against that exact
      # pinned package version. This is not verifiable from the repo; do not change
      # the action sequence without testing on hardware.
      - micro_wake_word.stop:
      - voice_assistant.start:
          silence_detection: false
      - delay: !lambda 'return (int)(id(zakhar_capture_seconds).state * 1000);'
      - voice_assistant.stop:
      - micro_wake_word.start:
